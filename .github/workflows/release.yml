name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  package-cli:
    name: Package CLI
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and test
        shell: pwsh
        run: ./build-tests.ps1

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item -LiteralPath bin/NozzleScheduleExtractor.exe -Destination dist/NozzleScheduleExtractor.exe -Force
          Copy-Item -LiteralPath README.md -Destination dist/README.md -Force
          Compress-Archive -Path dist/* -DestinationPath NozzleScheduleExtractor-cli.zip -Force

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: NozzleScheduleExtractor-cli
          path: NozzleScheduleExtractor-cli.zip
          if-no-files-found: error
